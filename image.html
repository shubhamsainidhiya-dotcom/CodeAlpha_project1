<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LENS — Image Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #222;
    --accent: #d4af37;
    --text: #e8e0d0;
    --muted: #555;
    --white: #f5f0e8;
    --radius: 2px;
    --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

 
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 48px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 22px; letter-spacing: 0.3em; color: var(--white); font-style: italic; }
  .logo span { color: var(--accent); font-style: normal; }
  .header-meta { color: var(--muted); letter-spacing: 0.12em; font-size: 11px; }

  /* HERO */
  .hero { padding: 64px 48px 48px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(42px, 6vw, 80px); line-height: 0.9; color: var(--white); letter-spacing: -0.02em; }
  .hero-title em { color: var(--accent); display: block; }
  .hero-desc { max-width: 320px; color: var(--muted); line-height: 1.7; font-size: 12px; letter-spacing: 0.04em; }

  /* FILTERS */
  .filter-bar { padding: 0 48px 40px; display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .filter-label { color: var(--muted); margin-right: 12px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; }
  .filter-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 7px 18px; font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.12em; cursor: pointer; transition: all 0.25s ease;
    border-radius: var(--radius); text-transform: uppercase;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0a0a0a; }

  /* FX BAR */
  .fx-bar { padding: 0 48px 40px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
  .fx-label { color: var(--muted); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; margin-right: 4px; }
  .fx-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 6px 14px; font-family: 'DM Mono', monospace; font-size: 11px;
    cursor: pointer; transition: all 0.25s ease; border-radius: var(--radius); letter-spacing: 0.08em;
  }
  .fx-btn:hover { border-color: #444; color: var(--text); }
  .fx-btn.active { border-color: #888; color: var(--white); background: #1a1a1a; }

  /* GALLERY */
  .count-bar { padding: 0 48px 20px; color: var(--muted); font-size: 11px; letter-spacing: 0.1em; }
  .count-bar span { color: var(--accent); }
  .gallery-wrap { padding: 0 40px 80px; }
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    grid-auto-flow: dense;
  }

  .gallery-item:nth-child(5n+1) { grid-row: span 2; }
  .gallery-item:nth-child(7n+3) { grid-column: span 2; }

  .gallery-item {
    position: relative; overflow: hidden; border-radius: var(--radius);
    cursor: pointer; background: var(--surface); border: 1px solid var(--border);
    aspect-ratio: 4/3; animation: fadeUp 0.5s ease both;
  }
  .gallery-item:nth-child(1)  { animation-delay: 0.05s; }
  .gallery-item:nth-child(2)  { animation-delay: 0.10s; }
  .gallery-item:nth-child(3)  { animation-delay: 0.15s; }
  .gallery-item:nth-child(4)  { animation-delay: 0.20s; }
  .gallery-item:nth-child(5)  { animation-delay: 0.25s; }
  .gallery-item:nth-child(6)  { animation-delay: 0.30s; }
  .gallery-item:nth-child(7)  { animation-delay: 0.35s; }
  .gallery-item:nth-child(8)  { animation-delay: 0.40s; }
  .gallery-item:nth-child(9)  { animation-delay: 0.45s; }
  .gallery-item:nth-child(10) { animation-delay: 0.50s; }
  .gallery-item:nth-child(11) { animation-delay: 0.55s; }
  .gallery-item:nth-child(12) { animation-delay: 0.60s; }
  .gallery-item:nth-child(5n+1) { aspect-ratio: 4/5; }
  .gallery-item:nth-child(7n+3) { aspect-ratio: 16/7; }

  .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform var(--transition), filter var(--transition); }
  .gallery-item:hover img { transform: scale(1.06); }

 
  .fx-none  img { filter: none; }
  .fx-bw    img { filter: grayscale(1) contrast(1.1); }
  .fx-warm  img { filter: sepia(0.4) saturate(1.3) brightness(1.05); }
  .fx-cool  img { filter: hue-rotate(200deg) saturate(0.8) brightness(0.95); }
  .fx-fade  img { filter: contrast(0.85) saturate(0.6) brightness(1.1); }
  .fx-drama img { filter: contrast(1.3) saturate(1.4) brightness(0.9); }

 
  .gallery-item .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%);
    opacity: 0; transition: opacity var(--transition);
    display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
  }
  .gallery-item:hover .overlay { opacity: 1; }
  .overlay-title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--white); margin-bottom: 4px; transform: translateY(8px); transition: transform var(--transition); }
  .gallery-item:hover .overlay-title { transform: translateY(0); }
  .overlay-meta { font-size: 10px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; transform: translateY(8px); transition: transform var(--transition) 0.05s; }
  .gallery-item:hover .overlay-meta { transform: translateY(0); }
  .overlay-icon { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity var(--transition); backdrop-filter: blur(6px); background: rgba(255,255,255,0.05); }
  .gallery-item:hover .overlay-icon { opacity: 1; }
  .overlay-icon svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 1.5; }
  .gallery-item.hidden { display: none; }

  .empty-state { display: none; padding: 80px; text-align: center; color: var(--muted); }
  .empty-state.show { display: block; }
  .empty-state p { font-size: 14px; font-family: 'Playfair Display', serif; font-style: italic; }

  
  .lightbox { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lb-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); }
  .lb-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; max-width: 90vw; max-height: 90vh; transform: scale(0.94); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  .lightbox.open .lb-content { transform: scale(1); }
  .lb-img-wrap { overflow: hidden; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
  .lb-img-wrap img { display: block; max-width: min(900px, 85vw); max-height: 70vh; width: auto; height: auto; object-fit: contain; transition: filter var(--transition); }
  .lb-caption { margin-top: 20px; text-align: center; }
  .lb-caption-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--white); margin-bottom: 4px; }
  .lb-caption-meta  { font-size: 11px; color: var(--muted); letter-spacing: 0.12em; }
  .lb-counter       { font-size: 11px; color: var(--accent); letter-spacing: 0.2em; margin-top: 8px; }

  .lb-nav { position: fixed; top: 50%; transform: translateY(-50%); z-index: 3; }
  .lb-nav.prev { left: 24px; }
  .lb-nav.next { right: 24px; }
  .lb-arrow { width: 52px; height: 52px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; backdrop-filter: blur(8px); border-radius: 50%; }
  .lb-arrow:hover { background: rgba(212,175,55,0.15); border-color: var(--accent); }
  .lb-arrow svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 1.5; }

  .lb-close { position: fixed; top: 24px; right: 24px; width: 44px; height: 44px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 3; transition: all 0.2s ease; backdrop-filter: blur(8px); border-radius: 50%; }
  .lb-close:hover { background: rgba(255,255,255,0.1); }
  .lb-close svg { width: 16px; height: 16px; stroke: white; fill: none; stroke-width: 1.5; }

  .lb-thumbs { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 24px; display: flex; gap: 8px; justify-content: center; overflow-x: auto; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); scrollbar-width: none; }
  .lb-thumbs::-webkit-scrollbar { display: none; }
  .lb-thumb { width: 50px; height: 36px; object-fit: cover; border-radius: 1px; cursor: pointer; opacity: 0.4; transition: opacity 0.2s, outline 0.2s; flex-shrink: 0; outline: 1px solid transparent; }
  .lb-thumb.active { opacity: 1; outline: 1px solid var(--accent); outline-offset: 2px; }
  .lb-thumb:hover  { opacity: 0.8; }
  .lb-hint { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--muted); letter-spacing: 0.1em; white-space: nowrap; }

  
  @media (max-width: 768px) {
    header { padding: 20px 24px; }
    .hero, .filter-bar, .fx-bar, .count-bar { padding-left: 24px; padding-right: 24px; }
    .gallery-wrap { padding: 0 16px 60px; }
    .gallery { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .gallery-item:nth-child(7n+3) { grid-column: span 1; }
    .lb-nav.prev { left: 12px; }
    .lb-nav.next { right: 12px; }
    .lb-arrow { width: 40px; height: 40px; }
  }
  @media (max-width: 480px) {
    .gallery { grid-template-columns: repeat(2, 1fr); }
    .gallery-item:nth-child(5n+1) { grid-row: span 1; aspect-ratio: 4/3; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>


<header>
  <div class="logo">L<span>E</span>NS</div>
  <div class="header-meta">Collection — 2024</div>
</header>


<div class="hero">
  <h1 class="hero-title">Curated<em>Frames</em></h1>
  <p class="hero-desc">A gallery of moments drawn from nature, architecture, and the human condition. Click any image to explore.</p>
</div>


<div class="filter-bar">
  <span class="filter-label">Category</span>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="nature">Nature</button>
  <button class="filter-btn" data-filter="urban">Urban</button>
  <button class="filter-btn" data-filter="portrait">Portrait</button>
  <button class="filter-btn" data-filter="abstract">Abstract</button>
</div>


<div class="fx-bar">
  <span class="fx-label">Filter</span>
  <button class="fx-btn active" data-fx="fx-none">Original</button>
  <button class="fx-btn" data-fx="fx-bw">B&amp;W</button>
  <button class="fx-btn" data-fx="fx-warm">Warm</button>
  <button class="fx-btn" data-fx="fx-cool">Cool</button>
  <button class="fx-btn" data-fx="fx-fade">Fade</button>
  <button class="fx-btn" data-fx="fx-drama">Drama</button>
</div>

<div class="count-bar">Showing <span id="count">12</span> of 12 images</div>


<div class="gallery-wrap">
  <div class="gallery fx-none" id="gallery"></div>
  <div class="empty-state" id="emptyState"><p>No images in this category.</p></div>
</div>


<div class="lightbox" id="lightbox">
  <div class="lb-backdrop" id="lbBackdrop"></div>

  <button class="lb-close" id="lbClose" aria-label="Close">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>

  <div class="lb-nav prev">
    <button class="lb-arrow" id="lbPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </button>
  </div>
  <div class="lb-nav next">
    <button class="lb-arrow" id="lbNext" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9,6 15,12 9,18"/></svg>
    </button>
  </div>

  <div class="lb-content">
    <div class="lb-img-wrap">
      <img id="lbImg" src="" alt="">
    </div>
    <div class="lb-caption">
      <div class="lb-caption-title" id="lbTitle"></div>
      <div class="lb-caption-meta"  id="lbMeta"></div>
      <div class="lb-counter"       id="lbCounter"></div>
    </div>
  </div>

  <div class="lb-thumbs" id="lbThumbs"></div>
  <div class="lb-hint">← → navigate &nbsp;·&nbsp; ESC close</div>
</div>

<script>

const images = [
  { src:'https://picsum.photos/seed/alpine1/800/600',  title:'Alpine Silence',      cat:'nature',   meta:'Norway · 2024' },
  { src:'https://picsum.photos/seed/city22/900/600',   title:'Steel & Glass',       cat:'urban',    meta:'Tokyo · 2024' },
  { src:'https://picsum.photos/seed/port7/600/800',    title:'Golden Hour',         cat:'portrait', meta:'Studio · 2024' },
  { src:'https://picsum.photos/seed/abs99/700/600',    title:'Fractured Light',     cat:'abstract', meta:'Series III' },
  { src:'https://picsum.photos/seed/forest3/800/600',  title:'Emerald Canopy',      cat:'nature',   meta:'Oregon · 2024' },
  { src:'https://picsum.photos/seed/arch55/900/600',   title:'Brutalist Dreams',    cat:'urban',    meta:'Berlin · 2024' },
  { src:'https://picsum.photos/seed/face11/600/700',   title:'Quiet Contemplation', cat:'portrait', meta:'Marrakech · 2024' },
  { src:'https://picsum.photos/seed/wave88/800/600',   title:'Coastal Drift',       cat:'nature',   meta:'Iceland · 2024' },
  { src:'https://picsum.photos/seed/geo44/800/600',    title:'Layered Form',        cat:'abstract', meta:'Series VII' },
  { src:'https://picsum.photos/seed/bridge12/900/500', title:'Suspension',          cat:'urban',    meta:'New York · 2024' },
  { src:'https://picsum.photos/seed/desert9/800/600',  title:'Dune Geometry',       cat:'nature',   meta:'Sahara · 2024' },
  { src:'https://picsum.photos/seed/mirror3/700/700',  title:'Reflection Studies',  cat:'abstract', meta:'Series II' },
];


let activeFilter = 'all';
let activeFx     = 'fx-none';
let lbIndex      = 0;
let filtered     = [...images];

const fxMap = {
  'fx-none':  'none',
  'fx-bw':    'grayscale(1) contrast(1.1)',
  'fx-warm':  'sepia(0.4) saturate(1.3) brightness(1.05)',
  'fx-cool':  'hue-rotate(200deg) saturate(0.8) brightness(0.95)',
  'fx-fade':  'contrast(0.85) saturate(0.6) brightness(1.1)',
  'fx-drama': 'contrast(1.3) saturate(1.4) brightness(0.9)',
};

const gallery    = document.getElementById('gallery');
const emptyState = document.getElementById('emptyState');
const countEl    = document.getElementById('count');

function buildGallery() {
  gallery.innerHTML = '';
  filtered = activeFilter === 'all'
    ? [...images]
    : images.filter(i => i.cat === activeFilter);

  countEl.textContent = filtered.length;
  emptyState.classList.toggle('show', filtered.length === 0);

  filtered.forEach((img, idx) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.innerHTML = `
      <img src="${img.src}" alt="${img.title}" loading="lazy">
      <div class="overlay">
        <div class="overlay-icon">
          <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="overlay-title">${img.title}</div>
        <div class="overlay-meta">${img.cat} · ${img.meta}</div>
      </div>`;
    item.addEventListener('click', () => openLightbox(idx));
    gallery.appendChild(item);
  });
}


document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    buildGallery();
  });
});


document.querySelectorAll('.fx-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fx-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    gallery.classList.remove(activeFx);
    activeFx = btn.dataset.fx;
    gallery.classList.add(activeFx);
    applyFxToLbImg();
  });
});

function applyFxToLbImg() {
  document.getElementById('lbImg').style.filter = fxMap[activeFx] || 'none';
}


const lightbox  = document.getElementById('lightbox');
const lbImg     = document.getElementById('lbImg');
const lbTitle   = document.getElementById('lbTitle');
const lbMeta    = document.getElementById('lbMeta');
const lbCounter = document.getElementById('lbCounter');
const lbThumbs  = document.getElementById('lbThumbs');

function buildThumbs() {
  lbThumbs.innerHTML = '';
  filtered.forEach((img, i) => {
    const t = document.createElement('img');
    t.src = img.src; t.alt = img.title;
    t.className = 'lb-thumb' + (i === lbIndex ? ' active' : '');
    t.addEventListener('click', () => goTo(i));
    lbThumbs.appendChild(t);
  });
}

function openLightbox(idx) {
  lbIndex = idx;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
  buildThumbs();
  updateLb();
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

function goTo(idx) {
  lbIndex = (idx + filtered.length) % filtered.length;
  updateLb();
}

function updateLb() {
  const img = filtered[lbIndex];
  lbImg.src             = img.src;
  lbTitle.textContent   = img.title;
  lbMeta.textContent    = img.meta;
  lbCounter.textContent = `${String(lbIndex+1).padStart(2,'0')} / ${String(filtered.length).padStart(2,'0')}`;
  applyFxToLbImg();

  document.querySelectorAll('.lb-thumb').forEach((t, i) => t.classList.toggle('active', i === lbIndex));
  const active = lbThumbs.children[lbIndex];
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}


document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbBackdrop').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => goTo(lbIndex - 1));
document.getElementById('lbNext').addEventListener('click', () => goTo(lbIndex + 1));


document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  goTo(lbIndex - 1);
  if (e.key === 'ArrowRight') goTo(lbIndex + 1);
  if (e.key === 'Escape')     closeLightbox();
});


let touchStartX = 0;
lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
lightbox.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx < 0 ? goTo(lbIndex + 1) : goTo(lbIndex - 1);
});

// ── INIT ──────────────────────────────────────────────────────────
buildGallery();
</script>
</body>
</html>
